<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mad4Performance | Distribuidores Autorizados Mobil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #0057A8;
      --blue-dk:     #003F7D;
      --blue-lt:     #EBF3FF;
      --red:         #ED1B2D;
      --red-dk:      #C4151F;
      --white:       #FFFFFF;
      --f0:          #FAFAFA;
      --f1:          #F4F4F4;
      --f2:          #E5E5E5;
      --t1:          #111111;
      --t2:          #555555;
      --t3:          #999999;
      --green:       #16A34A;
      --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.07);
      --shadow-fab:  0 4px 20px rgba(0,0,0,.25), 0 1px 6px rgba(0,0,0,.12);
      --shadow-panel:6px 0 32px rgba(0,0,0,.1);
      --r:           10px;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--f1); color: var(--t1); }

    /* ── HEADER ─────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 62px;
      background: var(--blue);
      display: flex; align-items: center; padding: 0 16px; gap: 0;
      z-index: 600;
      border-bottom: 3px solid var(--red);
    }
    .h-mobil {
      height: 32px; width: auto; object-fit: contain;
    }
    .h-divider {
      width: 1px; height: 28px; background: rgba(255,255,255,.3);
      margin: 0 14px; flex-shrink: 0;
    }
    .h-text { flex: 1; }
    .h-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 800; letter-spacing: .5px;
      color: var(--white); line-height: 1; text-transform: uppercase;
    }
    .h-sub {
      font-size: 9px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,.6); margin-top: 2px;
    }
    .h-mad4 {
      height: 32px; width: auto; object-fit: contain;
      filter: brightness(0) invert(1); opacity: .9;
    }

    /* ── RED STRIP ───────────────────────────────── */
    .strip {
      position: fixed; top: 65px; left: 0; right: 0;
      background: var(--red);
      padding: 5px 16px;
      display: flex; align-items: center; gap: 8px;
      z-index: 599;
    }
    .strip p { font-size: 10.5px; color: rgba(255,255,255,.9); font-weight: 500; }
    .strip strong { color: var(--white); font-weight: 700; }

    /* ── MAP ─────────────────────────────────────── */
    #map {
      position: fixed;
      top: 92px; left: 0; right: 0; bottom: 0;
      z-index: 1;
    }

    /* ── DRAWER ──────────────────────────────────── */
    .drawer {
      position: fixed; top: 92px; left: 0; bottom: 0;
      width: 350px; max-width: 93vw;
      background: var(--white);
      z-index: 500;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-panel);
      transform: translateX(-105%);
      transition: transform .38s cubic-bezier(.4,0,.2,1);
      pointer-events: all;
    }
    .drawer.open { transform: translateX(0); }

    /* drawer header */
    .drawer-head {
      padding: 14px 14px 12px;
      background: var(--f0);
      border-bottom: 1px solid var(--f2);
      flex-shrink: 0;
    }

    /* geo button */
    .geo-btn {
      width: 100%; border: none; border-radius: var(--r);
      background: var(--blue); color: var(--white);
      padding: 13px; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background .15s, transform .15s;
    }
    .geo-btn:hover:not(:disabled) { background: var(--blue-dk); transform: translateY(-1px); }
    .geo-btn:disabled { background: var(--f2); color: var(--t3); cursor: default; transform: none; }

    .geo-status {
      font-size: 11px; color: var(--t3); text-align: center;
      margin-top: 7px; min-height: 14px; transition: color .3s;
    }
    .geo-status.ok  { color: var(--green); font-weight: 600; }
    .geo-status.err { color: var(--red); }

    /* counter */
    .drawer-count {
      padding: 9px 14px; border-bottom: 1px solid var(--f2);
      font-size: 11.5px; color: var(--t3); flex-shrink: 0;
    }
    .drawer-count b { color: var(--t1); font-weight: 700; }

    /* list */
    .drawer-list {
      flex: 1; overflow-y: auto; padding: 10px;
      background: var(--f1);
    }
    .drawer-list::-webkit-scrollbar { width: 3px; }
    .drawer-list::-webkit-scrollbar-thumb { background: var(--f2); border-radius: 2px; }

    /* card */
    .d-card {
      background: var(--white); border-radius: var(--r);
      padding: 11px 13px; margin-bottom: 7px;
      display: flex; align-items: center; gap: 11px;
      cursor: pointer; border: 1.5px solid transparent;
      box-shadow: var(--shadow-card);
      transition: all .15s ease;
    }
    .d-card:hover { border-color: var(--blue); transform: translateX(3px); }
    .d-card.active { border-color: var(--blue); background: var(--blue-lt); }

    .d-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--f1); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10.5px; font-weight: 700; color: var(--t3);
    }
    .d-card.top3 .d-num { background: var(--blue); color: var(--white); }

    .d-body { flex: 1; min-width: 0; }
    .d-name {
      font-size: 12px; font-weight: 600; color: var(--t1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .d-dist { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .d-dist.close { color: var(--blue); font-weight: 600; }

    .d-maps {
      flex-shrink: 0; padding: 7px 11px; border-radius: 7px;
      background: var(--blue); color: var(--white);
      font-size: 11px; font-weight: 600; text-decoration: none;
      transition: background .15s;
    }
    .d-maps:hover { background: var(--red); }

    /* skeleton */
    .skel {
      height: 56px; border-radius: var(--r); margin-bottom: 7px;
      background: linear-gradient(90deg, var(--f1) 25%, var(--f2) 50%, var(--f1) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

    /* ── FAB ─────────────────────────────────────── */
    .fab {
      position: fixed; bottom: 26px; left: 20px; z-index: 550;
      background: var(--blue); color: var(--white); border: none;
      border-radius: 50px; padding: 13px 20px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 9px;
      box-shadow: var(--shadow-fab); transition: all .22s ease;
    }
    .fab:hover { background: var(--red); transform: translateY(-2px); }
    .fab-badge {
      background: var(--red); color: var(--white);
      border-radius: 20px; padding: 2px 9px;
      font-size: 12px; font-weight: 800; min-width: 28px; text-align: center;
    }

    /* ── LEAFLET POPUP — fondo azul texto blanco ── */
    .leaflet-popup-content-wrapper {
      background: var(--blue) !important;
      border-radius: 14px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.2) !important;
      padding: 0 !important; border: none !important;
    }
    .leaflet-popup-content { margin: 0 !important; padding: 16px 18px !important; }
    .leaflet-popup-tip { background: var(--blue) !important; }
    .leaflet-popup-close-button {
      color: rgba(255,255,255,.7) !important;
      top: 10px !important; right: 12px !important; font-size: 18px !important;
    }
    .leaflet-popup-close-button:hover { color: var(--white) !important; }
    .popup-name {
      font-size: 13px; font-weight: 600;
      color: var(--white);
      margin-bottom: 11px; padding-right: 14px; line-height: 1.35;
    }
    .popup-go {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 14px; border-radius: 8px;
      background: var(--white); color: var(--blue);
      text-decoration: none; font-size: 12px; font-weight: 700;
      transition: background .15s;
    }
    .popup-go:hover { background: var(--red); color: var(--white); }

    @media (max-width: 480px) {
      .drawer { width: 100vw; max-width: 100vw; }
      .h-mad4 { height: 26px; }
      .h-mobil { height: 26px; }
    }
  </style>
</head>
<body>

  <header>
    <img src="IMG_0240.png" alt="Mobil" class="h-mobil" />
    <div class="h-divider"></div>
    <div class="h-text">
      <div class="h-title">Distribuidores Autorizados</div>
      <div class="h-sub">Red Mad4Performance · Venezuela</div>
    </div>
    <img src="IMG_3507.png" alt="Mad4Performance" class="h-mad4" />
  </header>

  <div class="strip">
    <p>Todos cuentan con <strong>Lubricante Mobil Original</strong> garantizado por Mad4Performance</p>
  </div>

  <div id="map"></div>

  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <button class="geo-btn" id="geoBtn" onclick="pedirUbicacion()">
        <span>📍</span> Encontrar el más cercano
      </button>
      <p class="geo-status" id="geoStatus">Activa tu ubicación para ordenar por cercanía</p>
    </div>
    <div class="drawer-count" id="count">Cargando distribuidores...</div>
    <div class="drawer-list" id="lista">
      <div class="skel"></div>
      <div class="skel" style="opacity:.7"></div>
      <div class="skel" style="opacity:.5"></div>
      <div class="skel" style="opacity:.3"></div>
    </div>
  </div>

  <button class="fab" id="fab" onclick="toggle()">
    <span>🏪</span>
    <span>Distribuidores</span>
    <span class="fab-badge" id="badge">...</span>
  </button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let clientes = [], mapa, userMarker;
    let userLat = null, userLng = null, activeIdx = null;

    // ── MAP INIT ──────────────────────────────────
    mapa = L.map('map', { zoomControl: true }).setView([10.48, -66.88], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> | © <a href="https://carto.com">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(mapa);

    // ── PANEL TOGGLE — solo con botón ─────────────
    function toggle() {
      document.getElementById('drawer').classList.toggle('open');
    }

    // ── LOAD DATA ─────────────────────────────────
    async function cargar() {
      try {
        const res = await fetch('/.netlify/functions/clientes');
        if (!res.ok) throw new Error(res.status);
        clientes = await res.json();
        agregarPins();
        renderLista(false);
        document.getElementById('count').innerHTML = `<b>${clientes.length}</b> distribuidores autorizados`;
        document.getElementById('badge').textContent = clientes.length;
      } catch (e) {
        document.getElementById('lista').innerHTML =
          `<div style="text-align:center;padding:40px 20px;color:var(--t3)">
            <div style="font-size:36px;margin-bottom:12px">⚠️</div>
            <p style="font-size:13px;line-height:1.5">No se pudieron cargar los distribuidores.<br>Por favor recarga la página.</p>
          </div>`;
        document.getElementById('count').textContent = 'Error al cargar';
        document.getElementById('badge').textContent = '!';
      }
    }

    // ── MAP PINS azul Mobil ───────────────────────
    function agregarPins() {
      clientes.forEach((c, i) => {
        const m = L.circleMarker([c.lat, c.lng], {
          radius: 7,
          fillColor: '#0057A8',
          color: '#003F7D',
          weight: 2,
          opacity: 1,
          fillOpacity: .85,
        });
        m.bindPopup(L.popup({ maxWidth: 250 }).setContent(`
          <div class="popup-name">${c.nombre}</div>
          <a href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}"
             target="_blank" rel="noopener" class="popup-go">📍 Cómo llegar</a>
        `));
        m.on('click', () => marcarCard(i));
        c._marker = m;
        c._origIdx = i;
        m.addTo(mapa);
      });
    }

    // ── GEOLOCATION ───────────────────────────────
    function pedirUbicacion() {
      const btn = document.getElementById('geoBtn');
      const st  = document.getElementById('geoStatus');
      if (!navigator.geolocation) {
        st.textContent = 'Tu navegador no soporta geolocalización';
        st.className = 'geo-status err'; return;
      }
      btn.disabled = true;
      btn.innerHTML = '<span>⏳</span> Obteniendo ubicación...';

      navigator.geolocation.getCurrentPosition(
        pos => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          if (userMarker) mapa.removeLayer(userMarker);
          userMarker = L.circleMarker([userLat, userLng], {
            radius: 10, fillColor: '#ED1B2D', color: '#fff', weight: 3, fillOpacity: 1,
          }).bindPopup('<b style="color:#fff">Tu ubicación</b>').addTo(mapa);
          mapa.setView([userLat, userLng], 14);
          clientes = clientes
            .map(c => ({ ...c, dist: haversine(userLat, userLng, c.lat, c.lng) }))
            .sort((a, b) => a.dist - b.dist);
          renderLista(true);
          btn.innerHTML = '<span>✅</span> Ordenados por cercanía';
          btn.style.background = 'var(--f1)';
          btn.style.color = 'var(--green)';
          btn.style.border = '1.5px solid var(--green)';
          st.textContent = '📍 Lista ordenada por distancia a tu ubicación';
          st.className = 'geo-status ok';
        },
        err => {
          btn.disabled = false;
          btn.innerHTML = '<span>📍</span> Intentar de nuevo';
          const msgs = {1:'Permiso denegado.',2:'Ubicación no disponible.',3:'Tiempo agotado.'};
          st.textContent = msgs[err.code] || 'Error al obtener ubicación.';
          st.className = 'geo-status err';
        },
        { timeout: 10000, maximumAge: 60000 }
      );
    }

    function haversine(a, b, c, d) {
      const R = 6371, dL = (c-a)*Math.PI/180, dN = (d-b)*Math.PI/180;
      const x = Math.sin(dL/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
    }

    // ── RENDER LIST ───────────────────────────────
    function renderLista(conUbicacion) {
      const el = document.getElementById('lista');
      if (!clientes.length) {
        el.innerHTML = '<p style="text-align:center;padding:40px;color:var(--t3)">Sin distribuidores disponibles.</p>';
        return;
      }
      el.innerHTML = clientes.map((c, i) => {
        const top3 = conUbicacion && i < 3;
        let distHtml = '';
        if (conUbicacion) {
          const d = c.dist < 1 ? `${(c.dist*1000).toFixed(0)} m` : `${c.dist.toFixed(1)} km`;
          distHtml = `<p class="d-dist${top3?' close':''}">${d} de distancia</p>`;
        }
        return `
          <div class="d-card${top3?' top3':''}" id="card-${i}" onclick="focoCard(${i})">
            <div class="d-num">${i+1}</div>
            <div class="d-body">
              <p class="d-name" title="${c.nombre}">${c.nombre}</p>
              ${distHtml}
            </div>
            <a href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}"
               target="_blank" rel="noopener" class="d-maps"
               onclick="event.stopPropagation()">Maps →</a>
          </div>`;
      }).join('');
    }

    function focoCard(i) {
      if (activeIdx !== null) document.getElementById(`card-${activeIdx}`)?.classList.remove('active');
      document.getElementById(`card-${i}`)?.classList.add('active');
      activeIdx = i;
      const c = clientes[i];
      mapa.setView([c.lat, c.lng], 16, { animate: true });
      if (c._marker) c._marker.openPopup();
    }

    function marcarCard(origIdx) {
      const i = clientes.findIndex(c => c._origIdx === origIdx);
      if (i < 0) return;
      if (activeIdx !== null) document.getElementById(`card-${activeIdx}`)?.classList.remove('active');
      const card = document.getElementById(`card-${i}`);
      if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      activeIdx = i;
    }

    cargar();
  </script>
</body>
</html>
