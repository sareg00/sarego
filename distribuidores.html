<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mad4Performance | Puntos de Venta Autorizados Mobil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:        #0057A8;
      --blue-dk:     #003F7D;
      --blue-lt:     #EBF3FF;
      --red:         #ED1B2D;
      --white:       #FFFFFF;
      --f0:          #FAFAFA;
      --f1:          #F4F4F4;
      --f2:          #E2E2E2;
      --t1:          #111111;
      --t2:          #555555;
      --t3:          #999999;
      --green:       #16A34A;
      --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.07);
      --shadow-fab:  0 4px 20px rgba(0,0,0,.25), 0 1px 6px rgba(0,0,0,.12);
      --shadow-panel:6px 0 32px rgba(0,0,0,.1);
      --r:           10px;
      --header-h:    62px;
      --strip-h:     34px;
      --top:         96px;
    }

    html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--f1); color: var(--t1); }

    /* ── HEADER ─────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
      background: var(--blue);
      display: flex; align-items: center; padding: 0 16px; gap: 0;
      z-index: 600;
      border-bottom: 3px solid var(--red);
    }
    .h-mobil { height: 32px; width: auto; object-fit: contain; }
    .h-divider { width: 1px; height: 28px; background: rgba(255,255,255,.3); margin: 0 14px; flex-shrink: 0; }
    .h-text { flex: 1; }
    .h-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px; font-weight: 800; letter-spacing: .5px;
      color: var(--white); line-height: 1; text-transform: uppercase;
    }
    .h-sub { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,.6); margin-top: 2px; }
    .h-mad4 { height: 46px; width: auto; object-fit: contain; }

    /* ── STRIP ───────────────────────────────────── */
    .strip {
      position: fixed; top: var(--header-h); left: 0; right: 0;
      background: var(--red); height: var(--strip-h);
      padding: 0 16px;
      display: flex; align-items: center;
      z-index: 599;
    }
    .strip p { font-size: 13px; color: var(--white); font-weight: 500; }
    .strip strong { font-weight: 700; }

    /* ── MAP ─────────────────────────────────────── */
    #map { position: fixed; top: var(--top); left: 0; right: 0; bottom: 0; z-index: 1; }

    /* ── DRAWER ──────────────────────────────────── */
    .drawer {
      position: fixed; top: var(--top); left: 0; bottom: 0;
      width: 360px; max-width: 94vw;
      background: var(--white);
      z-index: 500;
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-panel);
      transform: translateX(-105%);
      transition: transform .38s cubic-bezier(.4,0,.2,1);
    }
    .drawer.open { transform: translateX(0); }

    /* ── SEARCH ──────────────────────────────────── */
    .search-wrap {
      padding: 12px 12px 8px;
      background: var(--f0);
      border-bottom: 1px solid var(--f2);
      flex-shrink: 0;
    }
    .search-box {
      width: 100%; border: 1.5px solid var(--f2);
      border-radius: 8px; padding: 9px 12px 9px 36px;
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      background: var(--white); color: var(--t1);
      outline: none; transition: border-color .15s;
    }
    .search-box:focus { border-color: var(--blue); }
    .search-box::placeholder { color: var(--t3); }
    .search-icon {
      position: absolute; left: 24px; top: 50%; transform: translateY(-50%);
      font-size: 14px; pointer-events: none;
    }
    .search-rel { position: relative; }

    /* ── FILTERS ─────────────────────────────────── */
    .filters {
      display: flex; gap: 7px;
      padding: 8px 12px 10px;
      background: var(--f0);
      border-bottom: 1px solid var(--f2);
      flex-shrink: 0;
    }
    .filter-btn {
      flex: 1; border: 1.5px solid var(--f2);
      border-radius: 20px; padding: 7px 10px;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; background: var(--white); color: var(--t2);
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
    .filter-btn.active { background: var(--blue); border-color: var(--blue); color: var(--white); }
    .filter-btn.active.geo-pending { background: var(--f2); border-color: var(--f2); color: var(--t3); }

    /* geo status */
    .geo-status {
      padding: 5px 12px 8px;
      font-size: 11px; color: var(--t3); text-align: center;
      background: var(--f0); border-bottom: 1px solid var(--f2);
      flex-shrink: 0; min-height: 26px;
      transition: color .3s;
    }
    .geo-status.ok  { color: var(--green); font-weight: 600; }
    .geo-status.err { color: var(--red); }
    .geo-status.hide { display: none; }

    /* counter */
    .drawer-count {
      padding: 7px 14px; border-bottom: 1px solid var(--f2);
      font-size: 11.5px; color: var(--t3); flex-shrink: 0;
    }
    .drawer-count b { color: var(--t1); font-weight: 700; }

    /* list */
    .drawer-list { flex: 1; overflow-y: auto; padding: 10px; background: var(--f1); }
    .drawer-list::-webkit-scrollbar { width: 3px; }
    .drawer-list::-webkit-scrollbar-thumb { background: var(--f2); border-radius: 2px; }

    /* card */
    .d-card {
      background: var(--white); border-radius: var(--r);
      padding: 11px 13px; margin-bottom: 7px;
      display: flex; align-items: center; gap: 11px;
      cursor: pointer; border: 1.5px solid transparent;
      box-shadow: var(--shadow-card);
      transition: all .15s ease;
    }
    .d-card:hover { border-color: var(--blue); transform: translateX(3px); }
    .d-card.active { border-color: var(--blue); background: var(--blue-lt); }
    .d-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--f1); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10.5px; font-weight: 700; color: var(--t3);
    }
    .d-card.top3 .d-num { background: var(--blue); color: var(--white); }
    .d-body { flex: 1; min-width: 0; }
    .d-name { font-size: 12px; font-weight: 600; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .d-dist { font-size: 11px; color: var(--t3); margin-top: 2px; }
    .d-dist.close { color: var(--blue); font-weight: 600; }
    .d-maps {
      flex-shrink: 0; padding: 7px 11px; border-radius: 7px;
      background: var(--blue); color: var(--white);
      font-size: 11px; font-weight: 600; text-decoration: none;
      transition: background .15s;
    }
    .d-maps:hover { background: var(--red); }

    /* skeleton */
    .skel {
      height: 56px; border-radius: var(--r); margin-bottom: 7px;
      background: linear-gradient(90deg, var(--f1) 25%, var(--f2) 50%, var(--f1) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

    /* empty state */
    .empty {
      text-align: center; padding: 40px 20px; color: var(--t3);
    }
    .empty .icon { font-size: 32px; margin-bottom: 10px; }
    .empty p { font-size: 13px; line-height: 1.5; }

    /* ── FAB ─────────────────────────────────────── */
    .fab {
      position: fixed; bottom: 26px; left: 20px; z-index: 550;
      background: var(--blue); color: var(--white); border: none;
      border-radius: 50px; padding: 13px 20px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 9px;
      box-shadow: var(--shadow-fab); transition: all .22s ease;
    }
    .fab:hover { background: var(--red); transform: translateY(-2px); }
    .fab-badge {
      background: var(--red); color: var(--white);
      border-radius: 20px; padding: 2px 9px;
      font-size: 12px; font-weight: 800; min-width: 28px; text-align: center;
    }

    /* ── POPUP ───────────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: var(--blue) !important; border-radius: 14px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.2) !important;
      padding: 0 !important; border: none !important;
    }
    .leaflet-popup-content { margin: 0 !important; padding: 16px 18px !important; }
    .leaflet-popup-tip { background: var(--blue) !important; }
    .leaflet-popup-close-button { color: rgba(255,255,255,.7) !important; top: 10px !important; right: 12px !important; font-size: 18px !important; }
    .leaflet-popup-close-button:hover { color: var(--white) !important; }
    .popup-name { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 11px; padding-right: 14px; line-height: 1.35; }
    .popup-go {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 14px; border-radius: 8px;
      background: var(--white); color: var(--blue);
      text-decoration: none; font-size: 12px; font-weight: 700;
      transition: background .15s;
    }
    .popup-go:hover { background: var(--red); color: var(--white); }

    @media (max-width: 480px) {
      .drawer { width: 100vw; max-width: 100vw; }
      .h-mad4 { height: 36px; }
      .h-mobil { height: 26px; }
      .strip p { font-size: 11.5px; }
    }
  </style>
</head>
<body>

  <header>
    <img src="IMG_0240.png" alt="Mobil" class="h-mobil" />
    <div class="h-divider"></div>
    <div class="h-text">
      <div class="h-title">Puntos de Venta Autorizados</div>
      <div class="h-sub">Red Mad4Performance · Venezuela</div>
    </div>
    <img src="IMG_3507.png" alt="Mad4Performance" class="h-mad4" />
  </header>

  <div class="strip">
    <p>Todos cuentan con <strong>Lubricante Mobil Original</strong> garantizado por Mad4Performance</p>
  </div>

  <div id="map"></div>

  <div class="drawer open" id="drawer">

    <div class="search-wrap">
      <div class="search-rel">
        <span class="search-icon">🔍</span>
        <input class="search-box" id="searchBox" type="text"
               placeholder="Buscar por nombre..."
               oninput="filtrar()" autocomplete="off" />
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active geo-pending" id="btnCercano" onclick="setFiltro('cercano')">
        📍 Más cercano
      </button>
      <button class="filter-btn" id="btnAZ" onclick="setFiltro('az')">
        🔤 A — Z
      </button>
    </div>

    <div class="geo-status" id="geoStatus">⏳ Detectando tu ubicación...</div>

    <div class="drawer-count" id="count">Cargando puntos de venta...</div>

    <div class="drawer-list" id="lista">
      <div class="skel"></div>
      <div class="skel" style="opacity:.7"></div>
      <div class="skel" style="opacity:.5"></div>
      <div class="skel" style="opacity:.3"></div>
    </div>
  </div>

  <button class="fab" id="fab" onclick="toggleDrawer()">
    <span>🏪</span>
    <span>Puntos de Venta</span>
    <span class="fab-badge" id="badge">...</span>
  </button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── STATE ─────────────────────────────────────
    let todosClientes = [];   // lista original
    let userLat = null, userLng = null;
    let mapa, userMarker;
    let activeIdx = null;
    let filtroActual = 'cercano'; // 'cercano' | 'az'
    let busqueda = '';
    let geoListo = false;

    // ── MAP ───────────────────────────────────────
    mapa = L.map('map', { zoomControl: true }).setView([10.48, -66.88], 12);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://openstreetmap.org">OSM</a> | © <a href="https://carto.com">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(mapa);

    // ── DRAWER TOGGLE ─────────────────────────────
    function toggleDrawer() {
      document.getElementById('drawer').classList.toggle('open');
    }

    // ── LOAD DATA ─────────────────────────────────
    async function cargar() {
      try {
        const res = await fetch('/.netlify/functions/clientes');
        if (!res.ok) throw new Error(res.status);
        todosClientes = await res.json();
        // Asignar índice original para pin referencing
        todosClientes.forEach((c, i) => { c._id = i; });
        agregarPins();
        document.getElementById('badge').textContent = todosClientes.length;
        // Geolocation se pide al cargar
        pedirUbicacion();
      } catch (e) {
        document.getElementById('lista').innerHTML =
          `<div class="empty"><div class="icon">⚠️</div>
           <p>No se pudieron cargar los puntos de venta.<br>Por favor recarga la página.</p></div>`;
        document.getElementById('count').textContent = 'Error al cargar';
        document.getElementById('badge').textContent = '!';
        document.getElementById('geoStatus').textContent = '';
        document.getElementById('geoStatus').className = 'geo-status hide';
      }
    }

    // ── PINS ──────────────────────────────────────
    function agregarPins() {
      todosClientes.forEach(c => {
        c._marker = L.circleMarker([c.lat, c.lng], {
          radius: 7, fillColor: '#0057A8', color: '#003F7D',
          weight: 2, opacity: 1, fillOpacity: .85,
        });
        c._marker.bindPopup(L.popup({ maxWidth: 260 }).setContent(`
          <div class="popup-name">${c.nombre}</div>
          <a href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}"
             target="_blank" rel="noopener" class="popup-go">📍 Cómo llegar</a>
        `));
        c._marker.on('click', () => {
          const idx = listaActual().findIndex(x => x._id === c._id);
          if (idx >= 0) marcarCard(idx);
        });
        c._marker.addTo(mapa);
      });
    }

    // ── GEOLOCATION ───────────────────────────────
    function pedirUbicacion() {
      if (!navigator.geolocation) {
        fallbackSinGeo(); return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          geoListo = true;
          // Pin usuario
          if (userMarker) mapa.removeLayer(userMarker);
          userMarker = L.circleMarker([userLat, userLng], {
            radius: 10, fillColor: '#ED1B2D', color: '#fff', weight: 3, fillOpacity: 1,
          }).bindPopup('<b style="color:#fff">Tu ubicación</b>').addTo(mapa);
          // Calcular distancias
          todosClientes.forEach(c => {
            c.dist = haversine(userLat, userLng, c.lat, c.lng);
          });
          // Activar botón
          document.getElementById('btnCercano').classList.remove('geo-pending');
          document.getElementById('geoStatus').textContent = '📍 Ordenado por distancia a tu ubicación';
          document.getElementById('geoStatus').className = 'geo-status ok';
          filtroActual = 'cercano';
          renderLista();
          // Centrar en el más cercano
          const mas = listaActual()[0];
          if (mas) mapa.setView([mas.lat, mas.lng], 14, { animate: true });
        },
        err => { fallbackSinGeo(err); },
        { timeout: 8000, maximumAge: 60000 }
      );
    }

    function fallbackSinGeo(err) {
      geoListo = false;
      const st = document.getElementById('geoStatus');
      if (err && err.code === 1) {
        st.textContent = 'Permiso de ubicación denegado — mostrando A-Z';
      } else {
        st.textContent = 'Ubicación no disponible — mostrando A-Z';
      }
      st.className = 'geo-status err';
      document.getElementById('btnCercano').classList.add('geo-pending');
      filtroActual = 'az';
      document.getElementById('btnAZ').classList.add('active');
      document.getElementById('btnCercano').classList.remove('active');
      renderLista();
      document.getElementById('count').innerHTML = `<b>${todosClientes.length}</b> puntos de venta autorizados`;
    }

    // ── FILTROS ───────────────────────────────────
    function setFiltro(f) {
      if (f === 'cercano' && !geoListo) {
        // Reintentar geo
        document.getElementById('geoStatus').textContent = '⏳ Detectando tu ubicación...';
        document.getElementById('geoStatus').className = 'geo-status';
        pedirUbicacion(); return;
      }
      filtroActual = f;
      document.getElementById('btnCercano').classList.toggle('active', f === 'cercano');
      document.getElementById('btnAZ').classList.toggle('active', f === 'az');
      renderLista();
    }

    function filtrar() {
      busqueda = document.getElementById('searchBox').value.trim().toLowerCase();
      renderLista();
    }

    // ── LISTA CALCULADA ───────────────────────────
    function listaActual() {
      let arr = [...todosClientes];
      // Filtro búsqueda
      if (busqueda) {
        arr = arr.filter(c => c.nombre.toLowerCase().includes(busqueda));
      }
      // Ordenar
      if (filtroActual === 'cercano' && geoListo) {
        arr.sort((a, b) => a.dist - b.dist);
      } else {
        arr.sort((a, b) => a.nombre.localeCompare(b.nombre));
      }
      return arr;
    }

    // ── RENDER ────────────────────────────────────
    function renderLista() {
      const lista = listaActual();
      const el = document.getElementById('lista');

      document.getElementById('count').innerHTML =
        busqueda
          ? `<b>${lista.length}</b> resultado${lista.length !== 1 ? 's' : ''} para "<b>${busqueda}</b>"`
          : `<b>${lista.length}</b> puntos de venta autorizados`;

      if (!lista.length) {
        el.innerHTML = `<div class="empty"><div class="icon">🔍</div>
          <p>No se encontraron resultados<br>para "<b>${busqueda}</b>"</p></div>`;
        return;
      }

      el.innerHTML = lista.map((c, i) => {
        const top3 = filtroActual === 'cercano' && geoListo && i < 3 && !busqueda;
        let distHtml = '';
        if (filtroActual === 'cercano' && geoListo && c.dist != null) {
          const d = c.dist < 1 ? `${(c.dist*1000).toFixed(0)} m` : `${c.dist.toFixed(1)} km`;
          distHtml = `<p class="d-dist${top3?' close':''}">${d} de distancia</p>`;
        }
        return `
          <div class="d-card${top3?' top3':''}" id="card-${i}" onclick="focoCard(${i})">
            <div class="d-num">${i+1}</div>
            <div class="d-body">
              <p class="d-name" title="${c.nombre}">${c.nombre}</p>
              ${distHtml}
            </div>
            <a href="https://www.google.com/maps/dir/?api=1&destination=${c.lat},${c.lng}"
               target="_blank" rel="noopener" class="d-maps"
               onclick="event.stopPropagation()">Maps →</a>
          </div>`;
      }).join('');
    }

    // ── FOCUS ─────────────────────────────────────
    function focoCard(i) {
      if (activeIdx !== null) document.getElementById(`card-${activeIdx}`)?.classList.remove('active');
      document.getElementById(`card-${i}`)?.classList.add('active');
      activeIdx = i;
      const c = listaActual()[i];
      if (!c) return;
      mapa.setView([c.lat, c.lng], 16, { animate: true });
      if (c._marker) c._marker.openPopup();
    }

    function marcarCard(i) {
      if (activeIdx !== null) document.getElementById(`card-${activeIdx}`)?.classList.remove('active');
      const card = document.getElementById(`card-${i}`);
      if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
      activeIdx = i;
    }

    // ── HAVERSINE ─────────────────────────────────
    function haversine(a, b, c, d) {
      const R = 6371, dL = (c-a)*Math.PI/180, dN = (d-b)*Math.PI/180;
      const x = Math.sin(dL/2)**2 + Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
    }

    // ── INIT ──────────────────────────────────────
    cargar();
  </script>
</body>
</html>
